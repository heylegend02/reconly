services:
  - type: web
    name: reconly
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@osint.local
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: app-data
      mountPath: /var/data
